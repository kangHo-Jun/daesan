<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Structure Build - 구조물 조립 효과</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000000;
            overflow: hidden;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            color: #ffffff;
            padding: 20px;
            pointer-events: none;
        }

        h1 {
            font-size: 72px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fbbf24 0%, #f97316 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
        }

        .subtitle {
            font-size: 20px;
            color: #fbbf24;
            max-width: 600px;
        }

        .badge {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            margin-bottom: 30px;
            color: #fbbf24;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="content">
        <div class="badge">📦 스마트 물류 시스템</div>
        <h1>대산우드랜드</h1>
        <p class="subtitle">24시간 온라인 주문 · 토요일 운영</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let boxes = [];
        let rotationX = 0;
        let rotationY = 0;
        let targetRotationX = 0;
        let targetRotationY = 0;

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 마우스 위치
        let mouse = { x: width / 2, y: height / 2 };

        // 3D 박스 클래스 (건축 자재 블록)
        class Box3D {
            constructor(x, y, z, size, type) {
                this.x = x;
                this.y = y;
                this.z = z;
                this.size = size;
                this.type = type; // 'gypsum' or 'wood'
                this.opacity = 0;
                this.targetOpacity = 1;
                this.delay = Math.random() * 100;
            }

            // 3D 회전 변환
            rotate3D(x, y, z) {
                // Y축 회전
                let tempZ = z * Math.cos(rotationY) - x * Math.sin(rotationY);
                let tempX = z * Math.sin(rotationY) + x * Math.cos(rotationY);
                
                // X축 회전
                let finalZ = tempZ * Math.cos(rotationX) - y * Math.sin(rotationX);
                let finalY = tempZ * Math.sin(rotationX) + y * Math.cos(rotationX);

                return { x: tempX, y: finalY, z: finalZ };
            }

            update() {
                // 투명도 서서히 증가
                if (this.opacity < this.targetOpacity) {
                    this.opacity += 0.02;
                }
            }

            draw() {
                const centerX = width / 2;
                const centerY = height / 2;

                // 박스의 8개 꼭짓점
                const size = this.size;
                const vertices = [
                    this.rotate3D(this.x - size, this.y - size, this.z - size),
                    this.rotate3D(this.x + size, this.y - size, this.z - size),
                    this.rotate3D(this.x + size, this.y + size, this.z - size),
                    this.rotate3D(this.x - size, this.y + size, this.z - size),
                    this.rotate3D(this.x - size, this.y - size, this.z + size),
                    this.rotate3D(this.x + size, this.y - size, this.z + size),
                    this.rotate3D(this.x + size, this.y + size, this.z + size),
                    this.rotate3D(this.x - size, this.y + size, this.z + size),
                ];

                // 원근법 적용
                const scale = 300;
                const projectedVertices = vertices.map(v => ({
                    x: centerX + (v.x * scale) / (scale + v.z),
                    y: centerY + (v.y * scale) / (scale + v.z),
                    z: v.z
                }));

                // 면 그리기 (뒷면만)
                const faces = [
                    { indices: [0, 1, 2, 3], avgZ: (vertices[0].z + vertices[1].z + vertices[2].z + vertices[3].z) / 4 },
                    { indices: [4, 5, 6, 7], avgZ: (vertices[4].z + vertices[5].z + vertices[6].z + vertices[7].z) / 4 },
                    { indices: [0, 1, 5, 4], avgZ: (vertices[0].z + vertices[1].z + vertices[5].z + vertices[4].z) / 4 },
                    { indices: [2, 3, 7, 6], avgZ: (vertices[2].z + vertices[3].z + vertices[7].z + vertices[6].z) / 4 },
                    { indices: [0, 3, 7, 4], avgZ: (vertices[0].z + vertices[3].z + vertices[7].z + vertices[4].z) / 4 },
                    { indices: [1, 2, 6, 5], avgZ: (vertices[1].z + vertices[2].z + vertices[6].z + vertices[5].z) / 4 },
                ];

                // Z값으로 정렬 (뒤에서 앞으로)
                faces.sort((a, b) => a.avgZ - b.avgZ);

                faces.forEach(face => {
                    ctx.beginPath();
                    ctx.moveTo(projectedVertices[face.indices[0]].x, projectedVertices[face.indices[0]].y);
                    for (let i = 1; i < 4; i++) {
                        ctx.lineTo(projectedVertices[face.indices[i]].x, projectedVertices[face.indices[i]].y);
                    }
                    ctx.closePath();

                    // 자재 타입별 색상
                    const color = this.type === 'gypsum' 
                        ? `rgba(251, 191, 36, ${this.opacity * 0.3})` // 석고보드 - 황금색
                        : `rgba(217, 119, 6, ${this.opacity * 0.3})`; // 목재 - 갈색

                    ctx.fillStyle = color;
                    ctx.fill();

                    // 테두리
                    ctx.strokeStyle = this.type === 'gypsum' 
                        ? `rgba(251, 191, 36, ${this.opacity * 0.8})`
                        : `rgba(217, 119, 6, ${this.opacity * 0.8})`;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                });
            }
        }

        // 박스 초기화 (건축 자재 쌓기)
        function initBoxes() {
            boxes = [];
            const layers = 5;
            const boxesPerLayer = 4;

            for (let layer = 0; layer < layers; layer++) {
                for (let i = 0; i < boxesPerLayer; i++) {
                    const angle = (i / boxesPerLayer) * Math.PI * 2;
                    const radius = 100 + layer * 20;
                    const x = Math.cos(angle) * radius;
                    const z = Math.sin(angle) * radius;
                    const y = -layer * 60;
                    const size = 40;
                    const type = layer % 2 === 0 ? 'gypsum' : 'wood';

                    boxes.push(new Box3D(x, y, z, size, type));
                }
            }
        }
        initBoxes();

        // 애니메이션 루프
        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 회전 부드럽게
            rotationX += (targetRotationX - rotationX) * 0.05;
            rotationY += (targetRotationY - rotationY) * 0.05;

            // 자동 회전
            rotationY += 0.005;

            // 박스 업데이트 및 그리기
            boxes.forEach((box, index) => {
                if (index % 10 === Math.floor(Date.now() / 100) % 10) {
                    box.update();
                }
                box.draw();
            });

            requestAnimationFrame(animate);
        }
        animate();

        // 마우스 이벤트
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;

            // 마우스 위치로 회전 조절
            targetRotationY = ((e.clientX / width) - 0.5) * 0.5;
            targetRotationX = ((e.clientY / height) - 0.5) * 0.5;
        });

        // 클릭 시 재초기화
        canvas.addEventListener('click', () => {
            initBoxes();
        });
    </script>
</body>
</html>
