<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wood Grain Flow - 목재 결 흐름 효과</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1410;
            overflow: hidden;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            color: #ffffff;
            padding: 20px;
            pointer-events: none;
        }

        h1 {
            font-size: 72px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #d97706 0%, #92400e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
        }

        .subtitle {
            font-size: 20px;
            color: #d97706;
            max-width: 600px;
        }

        .badge {
            background: rgba(217, 119, 6, 0.1);
            border: 1px solid rgba(217, 119, 6, 0.3);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            margin-bottom: 30px;
            color: #d97706;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="content">
        <div class="badge">🌲 프리미엄 목재 전문</div>
        <h1>대산우드랜드</h1>
        <p class="subtitle">자연의 품격을 담은 건축자재</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let flowField = [];
        let flowFieldCols, flowFieldRows;
        let cellSize = 20;

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initFlowField();
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 마우스 위치
        let mouse = { x: width / 2, y: height / 2 };

        // Flow Field 초기화 (목재 결 패턴)
        function initFlowField() {
            flowFieldCols = Math.ceil(width / cellSize);
            flowFieldRows = Math.ceil(height / cellSize);
            flowField = [];

            for (let y = 0; y < flowFieldRows; y++) {
                flowField[y] = [];
                for (let x = 0; x < flowFieldCols; x++) {
                    // Perlin noise 대신 사인파로 목재 결 패턴
                    const angle = Math.sin(x * 0.05) * Math.cos(y * 0.05) * Math.PI;
                    flowField[y][x] = angle;
                }
            }
        }

        // 파티클 클래스
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.speedX = 0;
                this.speedY = 0;
                this.maxSpeed = 2;
                this.size = Math.random() * 2 + 0.5;
                this.opacity = Math.random() * 0.5 + 0.3;
                
                // 목재 색상 (갈색 계열)
                const brownShades = [
                    { r: 217, g: 119, b: 6 },   // 밝은 갈색
                    { r: 146, g: 64, b: 14 },   // 중간 갈색
                    { r: 92, g: 40, b: 8 },     // 어두운 갈색
                ];
                this.color = brownShades[Math.floor(Math.random() * brownShades.length)];
            }

            update() {
                // Flow Field에 따라 이동
                const col = Math.floor(this.x / cellSize);
                const row = Math.floor(this.y / cellSize);

                if (flowField[row] && flowField[row][col] !== undefined) {
                    const angle = flowField[row][col];
                    
                    // 마우스 영향
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 200) {
                        const force = (200 - distance) / 200;
                        const mouseAngle = Math.atan2(dy, dx);
                        this.speedX += Math.cos(mouseAngle) * force * 0.1;
                        this.speedY += Math.sin(mouseAngle) * force * 0.1;
                    }

                    this.speedX += Math.cos(angle) * 0.1;
                    this.speedY += Math.sin(angle) * 0.1;

                    // 속도 제한
                    const speed = Math.sqrt(this.speedX * this.speedX + this.speedY * this.speedY);
                    if (speed > this.maxSpeed) {
                        this.speedX = (this.speedX / speed) * this.maxSpeed;
                        this.speedY = (this.speedY / speed) * this.maxSpeed;
                    }

                    this.x += this.speedX;
                    this.y += this.speedY;

                    // 화면 밖으로 나가면 재시작
                    if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                        this.reset();
                    }
                }
            }

            draw() {
                // 파티클 그리기
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.opacity})`;
                ctx.shadowBlur = 5;
                ctx.shadowColor = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.opacity * 0.5})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                // 꼬리 효과 (목재 결처럼)
                const tailLength = 10;
                const tailX = this.x - this.speedX * tailLength;
                const tailY = this.y - this.speedY * tailLength;

                const gradient = ctx.createLinearGradient(tailX, tailY, this.x, this.y);
                gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0)`);
                gradient.addColorStop(1, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.opacity * 0.3})`);

                ctx.strokeStyle = gradient;
                ctx.lineWidth = this.size;
                ctx.beginPath();
                ctx.moveTo(tailX, tailY);
                ctx.lineTo(this.x, this.y);
                ctx.stroke();
            }
        }

        // 파티클 초기화
        function initParticles() {
            const particleCount = (width * height) / 5000;
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }
        initParticles();

        // 배경 목재 결 패턴
        function drawWoodGrainBackground() {
            ctx.strokeStyle = 'rgba(217, 119, 6, 0.03)';
            ctx.lineWidth = 1;

            for (let y = 0; y < flowFieldRows; y++) {
                for (let x = 0; x < flowFieldCols; x++) {
                    const angle = flowField[y][x];
                    const posX = x * cellSize;
                    const posY = y * cellSize;
                    const length = cellSize / 2;

                    ctx.beginPath();
                    ctx.moveTo(posX, posY);
                    ctx.lineTo(
                        posX + Math.cos(angle) * length,
                        posY + Math.sin(angle) * length
                    );
                    ctx.stroke();
                }
            }
        }

        // 애니메이션 루프
        function animate() {
            // 배경 페이드
            ctx.fillStyle = 'rgba(26, 20, 16, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // 목재 결 배경 (한 번만)
            if (particles.length > 0) {
                ctx.globalAlpha = 0.1;
                drawWoodGrainBackground();
                ctx.globalAlpha = 1;
            }

            // 파티클 업데이트 및 그리기
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            requestAnimationFrame(animate);
        }
        animate();

        // 마우스 이벤트
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // 클릭 시 파티클 추가
        canvas.addEventListener('click', (e) => {
            for (let i = 0; i < 20; i++) {
                const particle = new Particle();
                particle.x = e.clientX;
                particle.y = e.clientY;
                particles.push(particle);
            }
        });
    </script>
</body>
</html>
