<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Circuit - 디지털 회로 패턴</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            overflow: hidden;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            color: #ffffff;
            padding: 20px;
            pointer-events: none;
        }

        h1 {
            font-size: 72px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
        }

        .subtitle {
            font-size: 20px;
            color: #06b6d4;
            max-width: 600px;
        }

        .badge {
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.3);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            margin-bottom: 30px;
            color: #06b6d4;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="content">
        <div class="badge">🤖 AI 기반 스마트 물류</div>
        <h1>대산우드랜드</h1>
        <p class="subtitle">기술로 혁신하는 건축자재 유통</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let nodes = [];
        let connections = [];
        let pulses = [];

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initCircuit();
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 마우스 위치
        let mouse = { x: width / 2, y: height / 2 };

        // 회로 노드 클래스
        class CircuitNode {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type; // 'main', 'sub', 'micro'
                this.size = type === 'main' ? 6 : type === 'sub' ? 4 : 2;
                this.active = false;
                this.activationTime = 0;
                this.pulseDelay = Math.random() * 100;
            }

            update(time) {
                // 마우스와의 거리
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                // 마우스 근처 활성화
                if (distance < 150) {
                    this.active = true;
                    this.activationTime = time;
                } else if (time - this.activationTime > 30) {
                    this.active = false;
                }
            }

            draw() {
                // 노드 외곽선
                ctx.strokeStyle = this.active 
                    ? 'rgba(6, 182, 212, 0.8)' 
                    : 'rgba(6, 182, 212, 0.3)';
                ctx.lineWidth = this.active ? 2 : 1;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.stroke();

                // 노드 중심
                if (this.active) {
                    ctx.fillStyle = 'rgba(6, 182, 212, 0.8)';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = 'rgba(6, 182, 212, 0.8)';
                } else {
                    ctx.fillStyle = 'rgba(6, 182, 212, 0.3)';
                    ctx.shadowBlur = 0;
                }
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // 큰 노드는 사각형 장식
                if (this.type === 'main') {
                    ctx.strokeStyle = this.active 
                        ? 'rgba(6, 182, 212, 0.5)' 
                        : 'rgba(6, 182, 212, 0.2)';
                    ctx.lineWidth = 1;
                    const rectSize = this.size * 2.5;
                    ctx.strokeRect(
                        this.x - rectSize / 2,
                        this.y - rectSize / 2,
                        rectSize,
                        rectSize
                    );
                }
            }
        }

        // 연결선 클래스
        class Connection {
            constructor(node1, node2) {
                this.node1 = node1;
                this.node2 = node2;
                this.active = false;
            }

            update() {
                // 둘 중 하나라도 활성화되면 연결선도 활성화
                this.active = this.node1.active || this.node2.active;
            }

            draw() {
                const opacity = this.active ? 0.5 : 0.15;
                const lineWidth = this.active ? 1.5 : 0.5;

                ctx.strokeStyle = `rgba(6, 182, 212, ${opacity})`;
                ctx.lineWidth = lineWidth;
                ctx.beginPath();
                ctx.moveTo(this.node1.x, this.node1.y);
                ctx.lineTo(this.node2.x, this.node2.y);
                ctx.stroke();

                // 중간에 작은 사각형 (회로 느낌)
                if (this.active) {
                    const midX = (this.node1.x + this.node2.x) / 2;
                    const midY = (this.node1.y + this.node2.y) / 2;
                    const size = 3;

                    ctx.fillStyle = 'rgba(6, 182, 212, 0.5)';
                    ctx.fillRect(midX - size / 2, midY - size / 2, size, size);
                }
            }
        }

        // 펄스 클래스 (데이터 흐름)
        class Pulse {
            constructor(connection) {
                this.connection = connection;
                this.progress = 0;
                this.speed = 0.02 + Math.random() * 0.03;
                this.size = 3;
            }

            update() {
                this.progress += this.speed;
            }

            draw() {
                if (this.progress <= 1) {
                    const x = this.connection.node1.x + 
                        (this.connection.node2.x - this.connection.node1.x) * this.progress;
                    const y = this.connection.node1.y + 
                        (this.connection.node2.y - this.connection.node1.y) * this.progress;

                    const opacity = Math.sin(this.progress * Math.PI) * 0.8;

                    ctx.fillStyle = `rgba(6, 182, 212, ${opacity})`;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = 'rgba(6, 182, 212, 0.8)';
                    ctx.beginPath();
                    ctx.arc(x, y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            isDone() {
                return this.progress > 1;
            }
        }

        // 회로 초기화
        function initCircuit() {
            nodes = [];
            connections = [];

            // 그리드 기반 노드 생성
            const cols = 8;
            const rows = 5;
            const marginX = width * 0.1;
            const marginY = height * 0.15;
            const spacingX = (width - marginX * 2) / (cols - 1);
            const spacingY = (height - marginY * 2) / (rows - 1);

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const x = marginX + col * spacingX;
                    const y = marginY + row * spacingY;
                    
                    // 타입 결정
                    let type = 'micro';
                    if ((row === 2 && col === 3) || (row === 2 && col === 4)) {
                        type = 'main';
                    } else if (Math.random() < 0.3) {
                        type = 'sub';
                    }

                    nodes.push(new CircuitNode(x, y, type));
                }
            }

            // 연결선 생성 (가로, 세로, 일부 대각선)
            for (let i = 0; i < nodes.length; i++) {
                // 오른쪽 노드 연결
                if ((i + 1) % cols !== 0) {
                    connections.push(new Connection(nodes[i], nodes[i + 1]));
                }

                // 아래 노드 연결
                if (i + cols < nodes.length) {
                    connections.push(new Connection(nodes[i], nodes[i + cols]));
                }

                // 대각선 (일부만)
                if (Math.random() < 0.2 && (i + 1) % cols !== 0 && i + cols + 1 < nodes.length) {
                    connections.push(new Connection(nodes[i], nodes[i + cols + 1]));
                }
            }
        }

        let time = 0;
        let pulseInterval = 0;

        // 애니메이션 루프
        function animate() {
            // 배경
            ctx.fillStyle = 'rgba(15, 23, 42, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 노드 업데이트
            nodes.forEach(node => {
                node.update(time);
            });

            // 연결선 업데이트 및 그리기
            connections.forEach(connection => {
                connection.update();
                connection.draw();
            });

            // 노드 그리기
            nodes.forEach(node => {
                node.draw();
            });

            // 펄스 생성
            pulseInterval++;
            if (pulseInterval > 20) {
                pulseInterval = 0;
                const activeConnections = connections.filter(c => c.active);
                if (activeConnections.length > 0) {
                    const randomConnection = activeConnections[
                        Math.floor(Math.random() * activeConnections.length)
                    ];
                    pulses.push(new Pulse(randomConnection));
                }
            }

            // 펄스 업데이트 및 그리기
            pulses = pulses.filter(pulse => {
                pulse.update();
                pulse.draw();
                return !pulse.isDone();
            });

            time++;
            requestAnimationFrame(animate);
        }
        animate();

        // 마우스 이벤트
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // 클릭 시 펄스 폭발
        canvas.addEventListener('click', (e) => {
            connections.forEach(connection => {
                if (connection.active) {
                    pulses.push(new Pulse(connection));
                }
            });
        });
    </script>
</body>
</html>
