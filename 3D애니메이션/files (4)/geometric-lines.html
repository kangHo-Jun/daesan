<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Lines - 기하학적 구조선</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #ffffff;
            overflow: hidden;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            color: #000000;
            padding: 20px;
            pointer-events: none;
        }

        h1 {
            font-size: 72px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #000000;
            letter-spacing: -2px;
        }

        .subtitle {
            font-size: 20px;
            color: #404040;
            max-width: 600px;
        }

        .badge {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            margin-bottom: 30px;
            color: #404040;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="content">
        <div class="badge">⚡ 혁신적인 건축 솔루션</div>
        <h1>대산우드랜드</h1>
        <p class="subtitle">Building Tomorrow's Foundation</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let lines = [];
        let time = 0;

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initLines();
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 마우스 위치
        let mouse = { x: width / 2, y: height / 2 };

        // 기하학적 라인 클래스
        class GeometricLine {
            constructor(type) {
                this.type = type; // 'horizontal', 'vertical', 'diagonal'
                this.reset();
            }

            reset() {
                if (this.type === 'horizontal') {
                    this.x1 = 0;
                    this.x2 = 0;
                    this.y = Math.random() * height;
                    this.targetX = width;
                    this.speed = 2 + Math.random() * 3;
                } else if (this.type === 'vertical') {
                    this.x = Math.random() * width;
                    this.y1 = 0;
                    this.y2 = 0;
                    this.targetY = height;
                    this.speed = 2 + Math.random() * 3;
                } else {
                    this.x1 = Math.random() * width;
                    this.y1 = Math.random() * height;
                    this.length = 0;
                    this.maxLength = 100 + Math.random() * 200;
                    this.angle = Math.random() * Math.PI * 2;
                    this.speed = 1 + Math.random() * 2;
                }

                this.opacity = 0.1 + Math.random() * 0.3;
                this.lineWidth = 0.5 + Math.random() * 1.5;
                this.progress = 0;
            }

            update() {
                // 마우스와의 거리로 opacity 조절
                let centerX, centerY;
                
                if (this.type === 'horizontal') {
                    this.x2 += this.speed;
                    if (this.x2 >= this.targetX) {
                        this.x1 += this.speed;
                    }
                    if (this.x1 >= width) {
                        this.reset();
                    }
                    centerX = (this.x1 + this.x2) / 2;
                    centerY = this.y;
                } else if (this.type === 'vertical') {
                    this.y2 += this.speed;
                    if (this.y2 >= this.targetY) {
                        this.y1 += this.speed;
                    }
                    if (this.y1 >= height) {
                        this.reset();
                    }
                    centerX = this.x;
                    centerY = (this.y1 + this.y2) / 2;
                } else {
                    this.length += this.speed;
                    if (this.length > this.maxLength * 2) {
                        this.reset();
                    }
                    centerX = this.x1 + Math.cos(this.angle) * this.length / 2;
                    centerY = this.y1 + Math.sin(this.angle) * this.length / 2;
                }

                // 마우스 근처에서 밝아짐
                const dx = mouse.x - centerX;
                const dy = mouse.y - centerY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < 200) {
                    this.currentOpacity = this.opacity + (200 - distance) / 200 * 0.5;
                } else {
                    this.currentOpacity = this.opacity;
                }
            }

            draw() {
                ctx.strokeStyle = `rgba(0, 0, 0, ${this.currentOpacity || this.opacity})`;
                ctx.lineWidth = this.lineWidth;
                ctx.beginPath();

                if (this.type === 'horizontal') {
                    ctx.moveTo(this.x1, this.y);
                    ctx.lineTo(this.x2, this.y);
                } else if (this.type === 'vertical') {
                    ctx.moveTo(this.x, this.y1);
                    ctx.lineTo(this.x, this.y2);
                } else {
                    const x2 = this.x1 + Math.cos(this.angle) * Math.min(this.length, this.maxLength);
                    const y2 = this.y1 + Math.sin(this.angle) * Math.min(this.length, this.maxLength);
                    
                    if (this.length > this.maxLength) {
                        const offset = this.length - this.maxLength;
                        const x1 = this.x1 + Math.cos(this.angle) * offset;
                        const y1 = this.y1 + Math.sin(this.angle) * offset;
                        ctx.moveTo(x1, y1);
                    } else {
                        ctx.moveTo(this.x1, this.y1);
                    }
                    ctx.lineTo(x2, y2);
                }

                ctx.stroke();
            }
        }

        // 정적 그리드 라인
        function drawStaticGrid() {
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.lineWidth = 0.5;

            // 세로선
            for (let x = 0; x < width; x += 100) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }

            // 가로선
            for (let y = 0; y < height; y += 100) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
        }

        // 라인 초기화
        function initLines() {
            lines = [];
            
            // 수평선
            for (let i = 0; i < 5; i++) {
                lines.push(new GeometricLine('horizontal'));
            }
            
            // 수직선
            for (let i = 0; i < 5; i++) {
                lines.push(new GeometricLine('vertical'));
            }
            
            // 대각선
            for (let i = 0; i < 10; i++) {
                lines.push(new GeometricLine('diagonal'));
            }
        }

        // 중앙 포커스 사각형
        function drawCenterFocus() {
            const centerX = width / 2;
            const centerY = height / 2;
            const size = 200 + Math.sin(time * 0.02) * 20;

            ctx.strokeStyle = `rgba(0, 0, 0, ${0.1 + Math.sin(time * 0.03) * 0.05})`;
            ctx.lineWidth = 2;
            ctx.strokeRect(
                centerX - size / 2,
                centerY - size / 2,
                size,
                size
            );

            // 내부 사각형
            const innerSize = size * 0.7;
            ctx.strokeRect(
                centerX - innerSize / 2,
                centerY - innerSize / 2,
                innerSize,
                innerSize
            );
        }

        // 모서리 장식
        function drawCornerMarkers() {
            const size = 30;
            const margin = 30;
            const lineWidth = 2;

            ctx.strokeStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.lineWidth = lineWidth;

            // 좌상단
            ctx.beginPath();
            ctx.moveTo(margin, margin + size);
            ctx.lineTo(margin, margin);
            ctx.lineTo(margin + size, margin);
            ctx.stroke();

            // 우상단
            ctx.beginPath();
            ctx.moveTo(width - margin - size, margin);
            ctx.lineTo(width - margin, margin);
            ctx.lineTo(width - margin, margin + size);
            ctx.stroke();

            // 좌하단
            ctx.beginPath();
            ctx.moveTo(margin, height - margin - size);
            ctx.lineTo(margin, height - margin);
            ctx.lineTo(margin + size, height - margin);
            ctx.stroke();

            // 우하단
            ctx.beginPath();
            ctx.moveTo(width - margin - size, height - margin);
            ctx.lineTo(width - margin, height - margin);
            ctx.lineTo(width - margin, height - margin - size);
            ctx.stroke();
        }

        // 애니메이션 루프
        function animate() {
            // 배경
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, width, height);

            // 정적 그리드
            drawStaticGrid();

            // 중앙 포커스
            drawCenterFocus();

            // 모서리 장식
            drawCornerMarkers();

            // 라인 업데이트 및 그리기
            lines.forEach(line => {
                line.update();
                line.draw();
            });

            time++;
            requestAnimationFrame(animate);
        }
        animate();

        // 마우스 이벤트
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // 클릭 시 새 라인 생성
        canvas.addEventListener('click', () => {
            for (let i = 0; i < 3; i++) {
                const types = ['horizontal', 'vertical', 'diagonal'];
                const type = types[Math.floor(Math.random() * types.length)];
                lines.push(new GeometricLine(type));
            }
        });
    </script>
</body>
</html>
