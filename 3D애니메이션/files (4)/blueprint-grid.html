<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blueprint Grid - 건축 청사진 효과</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a1628;
            overflow: hidden;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            color: #ffffff;
            padding: 20px;
            pointer-events: none;
        }

        h1 {
            font-size: 72px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
        }

        .subtitle {
            font-size: 20px;
            color: #7dd3fc;
            max-width: 600px;
            margin-bottom: 10px;
        }

        .description {
            font-size: 16px;
            color: #94a3b8;
            max-width: 600px;
        }

        .badge {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            margin-bottom: 30px;
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="content">
        <div class="badge">🏗️ 스마트 건축자재 솔루션</div>
        <h1>대산우드랜드</h1>
        <p class="subtitle">혁신적인 건축자재 유통</p>
        <p class="description">석고보드 · 목재 · PF보드 전문</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let gridSize = 50;
        let gridPoints = [];
        let time = 0;

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initGrid();
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 마우스 위치
        let mouse = { x: width / 2, y: height / 2 };

        // 그리드 포인트 클래스
        class GridPoint {
            constructor(x, y) {
                this.baseX = x;
                this.baseY = y;
                this.x = x;
                this.y = y;
                this.active = false;
                this.activationTime = 0;
            }

            update() {
                // 마우스와의 거리
                const dx = mouse.x - this.baseX;
                const dy = mouse.y - this.baseY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                // 마우스 근처 활성화
                if (distance < 150) {
                    this.active = true;
                    this.activationTime = time;
                }

                // 시간이 지나면 비활성화
                if (this.active && time - this.activationTime > 60) {
                    this.active = false;
                }

                // 파동 효과
                const wave = Math.sin((this.baseX + this.baseY + time) * 0.01) * 2;
                this.x = this.baseX + wave;
                this.y = this.baseY + wave;
            }

            draw() {
                // 점 그리기
                const opacity = this.active ? 0.8 : 0.3;
                ctx.fillStyle = `rgba(0, 212, 255, ${opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.active ? 3 : 1.5, 0, Math.PI * 2);
                ctx.fill();

                // 활성화된 점은 빛남
                if (this.active) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = 'rgba(0, 212, 255, 0.8)';
                    ctx.fillStyle = 'rgba(0, 212, 255, 0.5)';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            drawLines(points) {
                points.forEach(point => {
                    const dx = this.baseX - point.baseX;
                    const dy = this.baseY - point.baseY;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    // 가로/세로/대각선만 연결
                    const isHorizontal = Math.abs(dy) < 1 && Math.abs(dx) === gridSize;
                    const isVertical = Math.abs(dx) < 1 && Math.abs(dy) === gridSize;
                    const isDiagonal = Math.abs(dx) === gridSize && Math.abs(dy) === gridSize;

                    if (isHorizontal || isVertical) {
                        // 둘 중 하나라도 활성화되면 선 강조
                        const opacity = (this.active || point.active) ? 0.6 : 0.15;
                        const lineWidth = (this.active || point.active) ? 1.5 : 0.5;

                        ctx.strokeStyle = `rgba(0, 212, 255, ${opacity})`;
                        ctx.lineWidth = lineWidth;
                        ctx.beginPath();
                        ctx.moveTo(this.x, this.y);
                        ctx.lineTo(point.x, point.y);
                        ctx.stroke();
                    }
                });
            }
        }

        // 그리드 초기화
        function initGrid() {
            gridPoints = [];
            for (let x = 0; x <= width + gridSize; x += gridSize) {
                for (let y = 0; y <= height + gridSize; y += gridSize) {
                    gridPoints.push(new GridPoint(x, y));
                }
            }
        }

        // 구조물 그리기 (사각형 강조)
        function drawStructures() {
            // 중앙 영역에 구조물
            const centerX = width / 2;
            const centerY = height / 2;

            // 회전하는 사각형 프레임
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(time * 0.001);

            for (let i = 0; i < 3; i++) {
                const size = 100 + i * 80;
                const opacity = 0.1 + i * 0.05;

                ctx.strokeStyle = `rgba(0, 212, 255, ${opacity})`;
                ctx.lineWidth = 2;
                ctx.strokeRect(-size / 2, -size / 2, size, size);
            }

            ctx.restore();
        }

        // 청사진 스타일 장식선
        function drawBlueprintLines() {
            ctx.strokeStyle = 'rgba(0, 212, 255, 0.2)';
            ctx.lineWidth = 0.5;

            // 모서리 장식
            const cornerSize = 30;
            const margin = 20;

            // 좌상단
            ctx.beginPath();
            ctx.moveTo(margin, margin + cornerSize);
            ctx.lineTo(margin, margin);
            ctx.lineTo(margin + cornerSize, margin);
            ctx.stroke();

            // 우상단
            ctx.beginPath();
            ctx.moveTo(width - margin - cornerSize, margin);
            ctx.lineTo(width - margin, margin);
            ctx.lineTo(width - margin, margin + cornerSize);
            ctx.stroke();

            // 좌하단
            ctx.beginPath();
            ctx.moveTo(margin, height - margin - cornerSize);
            ctx.lineTo(margin, height - margin);
            ctx.lineTo(margin + cornerSize, height - margin);
            ctx.stroke();

            // 우하단
            ctx.beginPath();
            ctx.moveTo(width - margin - cornerSize, height - margin);
            ctx.lineTo(width - margin, height - margin);
            ctx.lineTo(width - margin, height - margin - cornerSize);
            ctx.stroke();
        }

        // 애니메이션 루프
        function animate() {
            // 배경 (청사진 블루)
            ctx.fillStyle = '#0a1628';
            ctx.fillRect(0, 0, width, height);

            // 청사진 장식
            drawBlueprintLines();

            // 구조물
            drawStructures();

            // 그리드 선 그리기
            gridPoints.forEach(point => {
                point.update();
                point.drawLines(gridPoints);
            });

            // 그리드 점 그리기
            gridPoints.forEach(point => {
                point.draw();
            });

            time++;
            requestAnimationFrame(animate);
        }
        animate();

        // 마우스 이벤트
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // 클릭 시 파동 효과
        canvas.addEventListener('click', (e) => {
            gridPoints.forEach(point => {
                const dx = e.clientX - point.baseX;
                const dy = e.clientY - point.baseY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < 300) {
                    point.active = true;
                    point.activationTime = time + distance / 10;
                }
            });
        });
    </script>
</body>
</html>
