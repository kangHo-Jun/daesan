<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Canvas - 순수 파티클 배경</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            overflow-x: hidden;
        }

        #canvas-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            color: #ffffff;
            padding: 20px;
        }

        h1 {
            font-size: 64px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        p {
            font-size: 20px;
            color: #cccccc;
            max-width: 600px;
            margin-bottom: 40px;
        }

        .btn {
            padding: 16px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: transform 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
        }

        .badge {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <canvas id="canvas-background"></canvas>

    <div class="content">
        <div class="badge">🎨 Custom Canvas Animation</div>
        <h1>Pure JavaScript<br>Particle System</h1>
        <p>외부 라이브러리 없이 순수 JavaScript로 제작! 가볍고 빠릅니다.</p>
        <button class="btn">Get Started</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas-background');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let mouse = { x: null, y: null, radius: 150 };

        // Canvas 크기 설정
        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 파티클 클래스
        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 2 - 1;
                this.opacity = Math.random() * 0.5 + 0.3;
            }

            update() {
                // 마우스와의 거리 계산
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                // 마우스 근처에서 밀어내기
                if (distance < mouse.radius) {
                    let forceDirectionX = dx / distance;
                    let forceDirectionY = dy / distance;
                    let force = (mouse.radius - distance) / mouse.radius;
                    let directionX = forceDirectionX * force * 5;
                    let directionY = forceDirectionY * force * 5;

                    this.x -= directionX;
                    this.y -= directionY;
                }

                // 위치 업데이트
                this.x += this.speedX;
                this.y += this.speedY;

                // 화면 밖으로 나가면 반대편으로
                if (this.x > width) this.x = 0;
                if (this.x < 0) this.x = width;
                if (this.y > height) this.y = 0;
                if (this.y < 0) this.y = height;
            }

            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                // 그림자 효과
                ctx.shadowBlur = 10;
                ctx.shadowColor = `rgba(255, 255, 255, ${this.opacity * 0.5})`;
            }
        }

        // 파티클 초기화
        function initParticles() {
            particles = [];
            const numberOfParticles = (width * height) / 15000;
            for (let i = 0; i < numberOfParticles; i++) {
                particles.push(new Particle());
            }
        }
        initParticles();

        // 파티클 연결선 그리기
        function connectParticles() {
            for (let a = 0; a < particles.length; a++) {
                for (let b = a; b < particles.length; b++) {
                    let dx = particles[a].x - particles[b].x;
                    let dy = particles[a].y - particles[b].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 100) {
                        let opacity = (1 - distance / 100) * 0.3;
                        ctx.strokeStyle = `rgba(255, 255, 255, ${opacity})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // 애니메이션 루프
        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            // 파티클 그리기
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // 연결선 그리기
            connectParticles();

            requestAnimationFrame(animate);
        }
        animate();

        // 마우스 이벤트
        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // 클릭하면 새 파티클 생성
        canvas.addEventListener('click', (e) => {
            for (let i = 0; i < 5; i++) {
                let particle = new Particle();
                particle.x = e.x;
                particle.y = e.y;
                particles.push(particle);
            }
        });

        // 리사이즈 시 파티클 재초기화
        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });
    </script>
</body>
</html>
