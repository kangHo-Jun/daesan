<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanta.js WAVES - 3D 물결 배경</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        #vanta-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            color: #ffffff;
            padding: 20px;
        }

        h1 {
            font-size: 64px;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        p {
            font-size: 20px;
            color: #cccccc;
            max-width: 600px;
            margin-bottom: 40px;
        }

        .btn {
            padding: 16px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: transform 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
        }

        .badge {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div id="vanta-background"></div>

    <div class="content">
        <div class="badge">🌊 Vanta.js WAVES Effect</div>
        <h1>Ocean Waves<br>Background</h1>
        <p>마우스를 움직여보세요! 3D 물결이 반응합니다.</p>
        <button class="btn">Get Started</button>
    </div>

    <!-- Three.js (필수) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    
    <!-- Vanta.js WAVES -->
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.waves.min.js"></script>

    <script>
        // Vanta.js WAVES 초기화
        VANTA.WAVES({
            el: "#vanta-background",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            color: 0x0a0a0a,          // 물결 색상
            shininess: 30.00,          // 광택
            waveHeight: 20.00,         // 파도 높이
            waveSpeed: 1.00,           // 파도 속도
            zoom: 0.75                 // 줌 레벨
        });
    </script>
</body>
</html>
