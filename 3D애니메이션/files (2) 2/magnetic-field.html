<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Field - 자기장 효과</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000000;
            overflow: hidden;
            cursor: none;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            color: #ffffff;
            padding: 20px;
            pointer-events: none;
        }

        h1 {
            font-size: 72px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ff6b6b 0%, #4ecdc4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 20px;
            color: #cccccc;
            max-width: 600px;
        }

        .cursor-ring {
            position: fixed;
            width: 100px;
            height: 100px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.2s;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="cursor-ring"></div>

    <div class="content">
        <h1>Magnetic Field</h1>
        <p>마우스를 움직여보세요!<br>파티클이 자기장처럼 끌려옵니다 🧲</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const cursorRing = document.querySelector('.cursor-ring');

        let width, height;
        let particles = [];

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 마우스 위치
        let mouse = { x: width / 2, y: height / 2, radius: 100 };

        // 파티클 클래스
        class Particle {
            constructor() {
                this.reset();
                this.x = Math.random() * width;
                this.y = Math.random() * height;
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 3 + 1;
                this.baseX = this.x;
                this.baseY = this.y;
                this.density = Math.random() * 30 + 1;
                this.hue = Math.random() * 60 + 180; // 시안-블루 계열
            }

            update() {
                // 마우스와의 거리 계산
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;

                // 마우스 근처에서 끌어당기기
                let maxDistance = mouse.radius;
                let force = (maxDistance - distance) / maxDistance;

                if (distance < mouse.radius) {
                    let directionX = forceDirectionX * force * this.density;
                    let directionY = forceDirectionY * force * this.density;
                    this.x += directionX;
                    this.y += directionY;
                } else {
                    // 원래 위치로 복귀
                    if (this.x !== this.baseX) {
                        let dx = this.x - this.baseX;
                        this.x -= dx / 10;
                    }
                    if (this.y !== this.baseY) {
                        let dy = this.y - this.baseY;
                        this.y -= dy / 10;
                    }
                }
            }

            draw() {
                // 마우스와의 거리로 투명도 계산
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let opacity = distance < mouse.radius ? 
                    (1 - distance / mouse.radius) * 0.8 : 0.3;

                ctx.fillStyle = `hsla(${this.hue}, 100%, 50%, ${opacity})`;
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsla(${this.hue}, 100%, 50%, ${opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }

            // 연결선 그리기
            connect(particles) {
                particles.forEach(particle => {
                    let dx = this.x - particle.x;
                    let dy = this.y - particle.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 80) {
                        // 마우스 근처의 파티클만 연결
                        let mouseDistance = Math.sqrt(
                            Math.pow(mouse.x - this.x, 2) + 
                            Math.pow(mouse.y - this.y, 2)
                        );

                        if (mouseDistance < mouse.radius) {
                            let opacity = (1 - distance / 80) * 
                                         (1 - mouseDistance / mouse.radius) * 0.5;
                            ctx.strokeStyle = `rgba(255, 255, 255, ${opacity})`;
                            ctx.lineWidth = 1;
                            ctx.beginPath();
                            ctx.moveTo(this.x, this.y);
                            ctx.lineTo(particle.x, particle.y);
                            ctx.stroke();
                        }
                    }
                });
            }
        }

        // 파티클 초기화
        function initParticles() {
            particles = [];
            const numberOfParticles = (width * height) / 10000;
            for (let i = 0; i < numberOfParticles; i++) {
                particles.push(new Particle());
            }
        }
        initParticles();

        // 애니메이션 루프
        function animate() {
            ctx.clearRect(0, 0, width, height);

            // 파티클 업데이트 및 그리기
            particles.forEach((particle, index) => {
                particle.update();
                particle.draw();
                particle.connect(particles.slice(index + 1));
            });

            requestAnimationFrame(animate);
        }
        animate();

        // 마우스 이벤트
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;

            // 커서 링 위치
            cursorRing.style.left = e.clientX - 50 + 'px';
            cursorRing.style.top = e.clientY - 50 + 'px';
        });

        // 클릭 시 강한 당기기
        canvas.addEventListener('click', () => {
            const originalRadius = mouse.radius;
            mouse.radius = 300;
            
            setTimeout(() => {
                mouse.radius = originalRadius;
            }, 500);
        });

        // 리사이즈
        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });
    </script>
</body>
</html>
