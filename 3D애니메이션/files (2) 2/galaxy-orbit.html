<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Orbit - 은하 궤도 효과</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000000;
            overflow: hidden;
            cursor: none;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            color: #ffffff;
            padding: 20px;
            pointer-events: none;
        }

        h1 {
            font-size: 72px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 20px;
            color: #cccccc;
            max-width: 600px;
        }

        .cursor-glow {
            position: fixed;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="cursor-glow"></div>

    <div class="content">
        <h1>Galaxy Orbit</h1>
        <p>마우스를 움직여보세요!<br>은하처럼 파티클이 궤도를 돕니다 🌌</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const cursorGlow = document.querySelector('.cursor-glow');

        let width, height;
        let particles = [];
        let time = 0;

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 마우스 위치
        let mouse = { x: width / 2, y: height / 2 };
        let targetMouse = { x: width / 2, y: height / 2 };

        // 궤도 파티클 클래스
        class OrbitParticle {
            constructor(orbitRadius, speed, size) {
                this.angle = Math.random() * Math.PI * 2;
                this.orbitRadius = orbitRadius;
                this.speed = speed;
                this.size = size;
                this.hue = Math.random() * 60 + 260; // 보라-핑크 계열
                this.opacity = Math.random() * 0.5 + 0.5;
            }

            update() {
                this.angle += this.speed;
                this.x = mouse.x + Math.cos(this.angle) * this.orbitRadius;
                this.y = mouse.y + Math.sin(this.angle) * this.orbitRadius;
            }

            draw() {
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 2
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 60%, ${this.opacity})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 100%, 60%, 0)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                // 꼬리 효과
                const tailLength = 10;
                const prevAngle = this.angle - this.speed * tailLength;
                const prevX = mouse.x + Math.cos(prevAngle) * this.orbitRadius;
                const prevY = mouse.y + Math.sin(prevAngle) * this.orbitRadius;

                const tailGradient = ctx.createLinearGradient(
                    prevX, prevY, this.x, this.y
                );
                tailGradient.addColorStop(0, `hsla(${this.hue}, 100%, 60%, 0)`);
                tailGradient.addColorStop(1, `hsla(${this.hue}, 100%, 60%, ${this.opacity * 0.3})`);

                ctx.strokeStyle = tailGradient;
                ctx.lineWidth = this.size;
                ctx.beginPath();
                ctx.moveTo(prevX, prevY);
                ctx.lineTo(this.x, this.y);
                ctx.stroke();
            }
        }

        // 나선형 파티클 클래스
        class SpiralParticle {
            constructor() {
                this.reset();
            }

            reset() {
                this.angle = Math.random() * Math.PI * 2;
                this.radius = 0;
                this.maxRadius = 300;
                this.speed = 0.02;
                this.radiusSpeed = 2;
                this.size = Math.random() * 2 + 1;
                this.hue = Math.random() * 60 + 260;
            }

            update() {
                this.angle += this.speed;
                this.radius += this.radiusSpeed;

                if (this.radius > this.maxRadius) {
                    this.reset();
                }

                this.x = mouse.x + Math.cos(this.angle) * this.radius;
                this.y = mouse.y + Math.sin(this.angle) * this.radius;
            }

            draw() {
                const opacity = 1 - (this.radius / this.maxRadius);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${opacity * 0.6})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = `hsla(${this.hue}, 100%, 60%, ${opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 파티클 초기화
        function initParticles() {
            particles = [];
            
            // 궤도 파티클 (여러 겹)
            for (let orbit = 1; orbit <= 5; orbit++) {
                const particlesInOrbit = orbit * 8;
                const orbitRadius = orbit * 40;
                const speed = 0.02 / orbit;
                
                for (let i = 0; i < particlesInOrbit; i++) {
                    particles.push(new OrbitParticle(orbitRadius, speed, 3 / orbit));
                }
            }

            // 나선형 파티클
            for (let i = 0; i < 20; i++) {
                particles.push(new SpiralParticle());
            }
        }
        initParticles();

        // 애니메이션 루프
        function animate() {
            // 페이드 효과
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 마우스 부드럽게 따라가기
            mouse.x += (targetMouse.x - mouse.x) * 0.1;
            mouse.y += (targetMouse.y - mouse.y) * 0.1;

            // 중심 빛나는 원
            const coreGradient = ctx.createRadialGradient(
                mouse.x, mouse.y, 0,
                mouse.x, mouse.y, 20
            );
            coreGradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
            coreGradient.addColorStop(1, 'rgba(167, 139, 250, 0)');
            
            ctx.fillStyle = coreGradient;
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 20, 0, Math.PI * 2);
            ctx.fill();

            // 파티클 업데이트 및 그리기
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            time++;
            requestAnimationFrame(animate);
        }
        animate();

        // 마우스 이벤트
        window.addEventListener('mousemove', (e) => {
            targetMouse.x = e.clientX;
            targetMouse.y = e.clientY;

            cursorGlow.style.left = e.clientX + 'px';
            cursorGlow.style.top = e.clientY + 'px';
        });

        // 클릭 시 폭발
        canvas.addEventListener('click', (e) => {
            for (let i = 0; i < 30; i++) {
                const spiral = new SpiralParticle();
                spiral.x = e.clientX;
                spiral.y = e.clientY;
                particles.push(spiral);
            }
        });

        // 리사이즈
        window.addEventListener('resize', () => {
            resizeCanvas();
        });
    </script>
</body>
</html>
