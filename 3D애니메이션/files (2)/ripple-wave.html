<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripple Wave - 파동 물결 효과</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000000;
            overflow: hidden;
            cursor: none;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            color: #ffffff;
            padding: 20px;
            pointer-events: none;
        }

        h1 {
            font-size: 72px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 20px;
            color: #cccccc;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="content">
        <h1>Ripple Wave</h1>
        <p>마우스를 움직이거나 클릭해보세요!<br>물결처럼 퍼지는 파동 효과 🌊</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let ripples = [];

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 마우스 위치
        let mouse = { x: width / 2, y: height / 2 };
        let lastX = mouse.x;
        let lastY = mouse.y;

        // 파동 클래스
        class Ripple {
            constructor(x, y, maxRadius, color) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = maxRadius;
                this.speed = 3;
                this.opacity = 1;
                this.color = color;
                this.lineWidth = 3;
            }

            update() {
                this.radius += this.speed;
                this.opacity = 1 - (this.radius / this.maxRadius);
                this.lineWidth = 3 * this.opacity;
            }

            draw() {
                if (this.opacity > 0) {
                    // 외곽선
                    ctx.strokeStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.opacity})`;
                    ctx.lineWidth = this.lineWidth;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.opacity * 0.5})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.stroke();

                    // 내부 그라데이션
                    const gradient = ctx.createRadialGradient(
                        this.x, this.y, this.radius * 0.8,
                        this.x, this.y, this.radius
                    );
                    gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0)`);
                    gradient.addColorStop(1, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.opacity * 0.2})`);
                    
                    ctx.fillStyle = gradient;
                    ctx.fill();
                }
            }

            isDead() {
                return this.radius >= this.maxRadius;
            }
        }

        // 그리드 점 클래스 (배경)
        class GridDot {
            constructor(x, y) {
                this.baseX = x;
                this.baseY = y;
                this.x = x;
                this.y = y;
                this.size = 2;
            }

            update() {
                // 파동에 의한 변형
                let totalForceX = 0;
                let totalForceY = 0;

                ripples.forEach(ripple => {
                    const dx = this.baseX - ripple.x;
                    const dy = this.baseY - ripple.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    // 파동이 지나갈 때 점이 밀림
                    if (Math.abs(distance - ripple.radius) < 30) {
                        const force = (30 - Math.abs(distance - ripple.radius)) / 30;
                        const angle = Math.atan2(dy, dx);
                        totalForceX += Math.cos(angle) * force * 20;
                        totalForceY += Math.sin(angle) * force * 20;
                    }
                });

                // 부드럽게 원위치로
                this.x = this.baseX + totalForceX;
                this.y = this.baseY + totalForceY;
            }

            draw() {
                // 파동 근처의 점만 밝게
                let brightness = 0.3;
                
                ripples.forEach(ripple => {
                    const dx = this.x - ripple.x;
                    const dy = this.y - ripple.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (Math.abs(distance - ripple.radius) < 50) {
                        const intensity = (50 - Math.abs(distance - ripple.radius)) / 50;
                        brightness = Math.max(brightness, intensity * ripple.opacity);
                    }
                });

                ctx.fillStyle = `rgba(100, 200, 255, ${brightness})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 그리드 생성
        const gridDots = [];
        const gridSpacing = 30;

        for (let x = 0; x < width; x += gridSpacing) {
            for (let y = 0; y < height; y += gridSpacing) {
                gridDots.push(new GridDot(x, y));
            }
        }

        // 색상 배열
        const colors = [
            { r: 6, g: 182, b: 212 },    // cyan
            { r: 59, g: 130, b: 246 },   // blue
            { r: 139, g: 92, b: 246 },   // purple
            { r: 236, g: 72, b: 153 }    // pink
        ];

        // 마우스 이동 시 파동 생성
        let createRippleInterval = 0;

        // 애니메이션 루프
        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // 마우스 움직임 감지
            const distance = Math.sqrt(
                Math.pow(mouse.x - lastX, 2) + 
                Math.pow(mouse.y - lastY, 2)
            );

            if (distance > 10 && createRippleInterval === 0) {
                const color = colors[Math.floor(Math.random() * colors.length)];
                ripples.push(new Ripple(mouse.x, mouse.y, 200, color));
                lastX = mouse.x;
                lastY = mouse.y;
            }

            createRippleInterval = (createRippleInterval + 1) % 3;

            // 그리드 업데이트 및 그리기
            gridDots.forEach(dot => {
                dot.update();
                dot.draw();
            });

            // 파동 업데이트 및 그리기
            ripples = ripples.filter(ripple => {
                ripple.update();
                ripple.draw();
                return !ripple.isDead();
            });

            requestAnimationFrame(animate);
        }
        animate();

        // 마우스 이벤트
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // 클릭 시 큰 파동
        canvas.addEventListener('click', (e) => {
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    ripples.push(new Ripple(e.clientX, e.clientY, 300 + i * 50, color));
                }, i * 100);
            }
        });

        // 리사이즈
        window.addEventListener('resize', () => {
            resizeCanvas();
            gridDots.length = 0;
            for (let x = 0; x < width; x += gridSpacing) {
                for (let y = 0; y < height; y += gridSpacing) {
                    gridDots.push(new GridDot(x, y));
                }
            }
        });
    </script>
</body>
</html>
