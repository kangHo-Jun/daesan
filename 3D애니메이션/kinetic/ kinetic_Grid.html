<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대산우드랜드 - Kinetic Grid 랜딩페이지</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            overflow-x: hidden;
        }
        
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        .content {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        
        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }
        
        .subtitle {
            font-size: clamp(1.125rem, 3vw, 1.75rem);
            color: #64748b;
            margin-bottom: 2.5rem;
            max-width: 600px;
            line-height: 1.6;
        }
        
        .cta-button {
            padding: 1.25rem 2.5rem;
            font-size: 1.125rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.2);
        }
        
        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.3);
        }
        
        .cta-button:active {
            transform: translateY(-1px);
        }
        
        .features {
            margin-top: 5rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            max-width: 900px;
            width: 100%;
        }
        
        .feature {
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: all 0.3s ease;
        }
        
        .feature:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }
        
        .feature-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        .feature-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }
        
        .feature-desc {
            font-size: 0.875rem;
            color: #64748b;
            line-height: 1.5;
        }
        
        /* 스타일 선택 버튼 */
        .style-selector {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        
        .style-btn {
            padding: 8px 16px;
            background: #374151;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        
        .style-btn:hover {
            background: #4b5563;
        }
        
        .style-btn.active {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="content">
        <h1>대산우드랜드</h1>
        <p class="subtitle">
            건축자재 유통의 새로운 기준<br>
            30년의 신뢰로 24시간 빠른 배송
        </p>
        <button class="cta-button" onclick="alert('문의하기 페이지로 이동')">
            지금 상담하기 →
        </button>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🚚</div>
                <div class="feature-title">빠른 배송</div>
                <div class="feature-desc">24시간 온라인 주문<br>당일 배송 가능</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🏗️</div>
                <div class="feature-title">다양한 자재</div>
                <div class="feature-desc">석고보드, 목재, PF보드<br>원스톱 공급</div>
            </div>
            <div class="feature">
                <div class="feature-icon">⭐</div>
                <div class="feature-title">30년 신뢰</div>
                <div class="feature-desc">서울 수도권 1위<br>검증된 품질</div>
            </div>
        </div>
    </div>
    
    <!-- 스타일 선택 -->
    <div class="style-selector">
        <button class="style-btn active" onclick="changeStyle('default')">기본</button>
        <button class="style-btn" onclick="changeStyle('gradient')">그라데이션</button>
        <button class="style-btn" onclick="changeStyle('minimal')">미니멀</button>
    </div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let mouseX = -1000;
        let mouseY = -1000;
        let currentStyle = 'default';
        
        // 캔버스 크기 설정
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // 마우스 추적
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        document.addEventListener('mouseleave', () => {
            mouseX = -1000;
            mouseY = -1000;
        });
        
        // 스타일별 설정
        const styles = {
            default: {
                gridSize: 40,
                dotRadius: 2,
                maxDistance: 180,
                maxScale: 3,
                moveAmount: 15,
                color: (influence) => `rgba(37, 99, 235, ${0.2 + influence * 0.6})`,
                baseColor: 'rgba(156, 163, 175, 0.25)',
                baseScale: 0.6
            },
            gradient: {
                gridSize: 35,
                dotRadius: 2.5,
                maxDistance: 200,
                maxScale: 2.5,
                moveAmount: 12,
                color: (influence) => {
                    const hue = 220 - (influence * 40);
                    const sat = 60 + (influence * 30);
                    const light = 45 + (influence * 10);
                    return `hsla(${hue}, ${sat}%, ${light}%, ${0.2 + influence * 0.5})`;
                },
                baseColor: 'rgba(203, 213, 225, 0.3)',
                baseScale: 0.5,
                glow: true
            },
            minimal: {
                gridSize: 50,
                dotRadius: 1.5,
                maxDistance: 150,
                maxScale: 4,
                moveAmount: 0,
                color: (influence) => `rgba(15, 23, 42, ${0.15 + influence * 0.65})`,
                baseColor: 'rgba(148, 163, 184, 0.2)',
                baseScale: 1
            }
        };
        
        // 애니메이션
        function animate() {
            const style = styles[currentStyle];
            
            // 흰색 배경
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 그리드 그리기
            for (let x = style.gridSize; x < canvas.width; x += style.gridSize) {
                for (let y = style.gridSize; y < canvas.height; y += style.gridSize) {
                    const dx = mouseX - x;
                    const dy = mouseY - y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < style.maxDistance) {
                        // 마우스 근처
                        const influence = 1 - (distance / style.maxDistance);
                        const scale = 1 + (influence * style.maxScale);
                        
                        const offsetX = (dx / distance) * influence * style.moveAmount;
                        const offsetY = (dy / distance) * influence * style.moveAmount;
                        
                        // 글로우 효과 (gradient 스타일)
                        if (style.glow) {
                            ctx.shadowBlur = 15 * influence;
                            ctx.shadowColor = style.color(influence);
                        }
                        
                        ctx.beginPath();
                        ctx.arc(
                            x + offsetX, 
                            y + offsetY, 
                            style.dotRadius * scale, 
                            0, 
                            Math.PI * 2
                        );
                        ctx.fillStyle = style.color(influence);
                        ctx.fill();
                    } else {
                        // 기본 상태
                        ctx.shadowBlur = 0;
                        ctx.beginPath();
                        ctx.arc(x, y, style.dotRadius * style.baseScale, 0, Math.PI * 2);
                        ctx.fillStyle = style.baseColor;
                        ctx.fill();
                    }
                }
            }
            
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // 스타일 변경
        function changeStyle(styleName) {
            currentStyle = styleName;
            
            // 버튼 활성화 상태 변경
            document.querySelectorAll('.style-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
