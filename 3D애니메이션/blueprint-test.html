<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blueprint Grid - 작동 테스트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a1628;
            overflow: hidden;
        }

        #canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .content {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            color: #ffffff;
            pointer-events: none;
        }

        h1 {
            font-size: 64px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #00d4ff;
        }

        .subtitle {
            font-size: 20px;
            color: #7dd3fc;
        }

        .status {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 212, 255, 0.2);
            padding: 10px;
            border-radius: 5px;
            color: #00d4ff;
            font-size: 12px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="status">애니메이션 상태: <span id="status">시작 중...</span></div>
    <canvas id="canvas"></canvas>

    <div class="content">
        <h1>대산우드랜드</h1>
        <p class="subtitle">혁신적인 건축자재 유통</p>
    </div>

    <script>
        console.log('스크립트 시작!');
        
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');

        let W, H;
        let particles = [];
        let mouseX = 0;
        let mouseY = 0;
        let frameCount = 0;

        // Canvas 크기 설정
        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            console.log('Canvas 크기:', W, 'x', H);
        }

        // 파티클 클래스
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.baseX = x;
                this.baseY = y;
                this.vx = 0;
                this.vy = 0;
            }

            update() {
                // 마우스와의 거리
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 100) {
                    const force = (100 - dist) / 100;
                    this.vx += dx * force * 0.01;
                    this.vy += dy * force * 0.01;
                }

                // 원래 위치로 복귀
                this.vx += (this.baseX - this.x) * 0.05;
                this.vy += (this.baseY - this.y) * 0.05;

                // 마찰
                this.vx *= 0.95;
                this.vy *= 0.95;

                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.fillStyle = '#00d4ff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 초기화
        function init() {
            particles = [];
            const gap = 50;
            
            for (let x = gap; x < W; x += gap) {
                for (let y = gap; y < H; y += gap) {
                    particles.push(new Particle(x, y));
                }
            }
            
            console.log('파티클 개수:', particles.length);
            statusEl.textContent = '실행 중 ✓';
        }

        // 그리드 선 그리기
        function drawGrid() {
            ctx.strokeStyle = 'rgba(0, 212, 255, 0.1)';
            ctx.lineWidth = 0.5;

            // 세로선
            for (let x = 50; x < W; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, H);
                ctx.stroke();
            }

            // 가로선
            for (let y = 50; y < H; y += 50) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(W, y);
                ctx.stroke();
            }
        }

        // 애니메이션 루프
        function animate() {
            // 배경
            ctx.fillStyle = '#0a1628';
            ctx.fillRect(0, 0, W, H);

            // 그리드
            drawGrid();

            // 파티클 업데이트 및 그리기
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // 연결선 그리기
            ctx.strokeStyle = 'rgba(0, 212, 255, 0.2)';
            ctx.lineWidth = 1;
            
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 80) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            frameCount++;
            requestAnimationFrame(animate);
        }

        // 마우스 이벤트
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // 리사이즈
        window.addEventListener('resize', () => {
            resize();
            init();
        });

        // 시작!
        resize();
        init();
        animate();

        console.log('애니메이션 시작됨!');

        // 3초 후 상태 확인
        setTimeout(() => {
            console.log('3초 경과, 프레임:', frameCount);
            if (frameCount > 0) {
                statusEl.textContent = '정상 작동 중 (' + frameCount + ' 프레임) ✓';
            } else {
                statusEl.textContent = '오류 발생 ✗';
            }
        }, 3000);
    </script>
</body>
</html>
