<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Building - 집 건축 애니메이션</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8f9fa;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #canvas {
            background: #ffffff;
            box-shadow: 0 10px 50px rgba(0,0,0,0.1);
            border-radius: 20px;
        }

        .info {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #64748b;
            font-size: 14px;
            z-index: 10;
        }

        .stage {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 10px;
        }

        .company {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            font-weight: 700;
            color: #1e293b;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="company">대산우드랜드</div>
    <canvas id="canvas"></canvas>
    <div class="info">
        <div class="stage" id="stage">1단계: 기초 공사</div>
        <div>건축자재로 완성되는 우리 집</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Canvas 크기
        canvas.width = 800;
        canvas.height = 600;

        // 건축 단계
        let currentStage = 0;
        let progress = 0;
        const stageSpeed = 0.005; // 느리게 진행

        const stages = [
            { name: '1단계: 기초 공사', color: '#94a3b8' },
            { name: '2단계: 골조 세우기', color: '#64748b' },
            { name: '3단계: 벽체 구성', color: '#475569' },
            { name: '4단계: 지붕 올리기', color: '#ef4444' },
            { name: '5단계: 창문 설치', color: '#3b82f6' },
            { name: '6단계: 문 설치', color: '#8b5cf6' },
            { name: '완성!', color: '#10b981' }
        ];

        // 집 중심 좌표
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2 + 50;

        // 건축 요소 그리기 함수들
        function drawFoundation(p) {
            if (p <= 0) return;

            // 기초 (땅)
            ctx.fillStyle = '#94a3b8';
            const foundationWidth = 300 * Math.min(p, 1);
            ctx.fillRect(
                centerX - foundationWidth / 2,
                centerY + 100,
                foundationWidth,
                20
            );

            // 기초선
            ctx.strokeStyle = '#64748b';
            ctx.lineWidth = 2;
            ctx.strokeRect(
                centerX - foundationWidth / 2,
                centerY + 100,
                foundationWidth,
                20
            );
        }

        function drawFrame(p) {
            if (p <= 0) return;
            
            const frameProgress = Math.min(p, 1);
            ctx.strokeStyle = '#64748b';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // 왼쪽 기둥
            ctx.beginPath();
            ctx.moveTo(centerX - 120, centerY + 100);
            ctx.lineTo(centerX - 120, centerY + 100 - 150 * frameProgress);
            ctx.stroke();

            // 오른쪽 기둥
            ctx.beginPath();
            ctx.moveTo(centerX + 120, centerY + 100);
            ctx.lineTo(centerX + 120, centerY + 100 - 150 * frameProgress);
            ctx.stroke();
        }

        function drawWalls(p) {
            if (p <= 0) return;
            
            const wallProgress = Math.min(p, 1);
            
            // 왼쪽 벽
            ctx.fillStyle = '#e2e8f0';
            const leftWallHeight = 150 * wallProgress;
            ctx.fillRect(
                centerX - 120,
                centerY + 100 - leftWallHeight,
                8,
                leftWallHeight
            );

            // 오른쪽 벽
            ctx.fillRect(
                centerX + 112,
                centerY + 100 - leftWallHeight,
                8,
                leftWallHeight
            );

            // 뒷벽
            if (wallProgress > 0.5) {
                const backWallProgress = (wallProgress - 0.5) * 2;
                ctx.fillRect(
                    centerX - 120,
                    centerY - 50,
                    240 * backWallProgress,
                    8
                );
            }
        }

        function drawRoof(p) {
            if (p <= 0) return;
            
            const roofProgress = Math.min(p, 1);
            
            // 지붕
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.moveTo(centerX, centerY - 50 - 80 * roofProgress);
            ctx.lineTo(centerX - 150 * roofProgress, centerY - 50);
            ctx.lineTo(centerX - 150 * roofProgress + 10, centerY - 50);
            ctx.lineTo(centerX, centerY - 50 - 80 * roofProgress + 10);
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(centerX, centerY - 50 - 80 * roofProgress);
            ctx.lineTo(centerX + 150 * roofProgress, centerY - 50);
            ctx.lineTo(centerX + 150 * roofProgress - 10, centerY - 50);
            ctx.lineTo(centerX, centerY - 50 - 80 * roofProgress + 10);
            ctx.closePath();
            ctx.fill();

            // 지붕 테두리
            ctx.strokeStyle = '#dc2626';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(centerX - 150 * roofProgress, centerY - 50);
            ctx.lineTo(centerX, centerY - 50 - 80 * roofProgress);
            ctx.lineTo(centerX + 150 * roofProgress, centerY - 50);
            ctx.stroke();
        }

        function drawWindows(p) {
            if (p <= 0) return;
            
            const windowProgress = Math.min(p, 1);
            const windowSize = 40;

            // 왼쪽 창문
            ctx.fillStyle = '#93c5fd';
            const leftWindowHeight = windowSize * windowProgress;
            ctx.fillRect(
                centerX - 90,
                centerY + 20 - leftWindowHeight / 2,
                windowSize * windowProgress,
                leftWindowHeight
            );
            
            if (windowProgress > 0.8) {
                ctx.strokeStyle = '#3b82f6';
                ctx.lineWidth = 2;
                ctx.strokeRect(
                    centerX - 90,
                    centerY + 20 - windowSize / 2,
                    windowSize,
                    windowSize
                );
                // 십자 프레임
                ctx.beginPath();
                ctx.moveTo(centerX - 70, centerY);
                ctx.lineTo(centerX - 70, centerY + 40);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(centerX - 90, centerY + 20);
                ctx.lineTo(centerX - 50, centerY + 20);
                ctx.stroke();
            }

            // 오른쪽 창문
            if (windowProgress > 0.5) {
                const rightProgress = (windowProgress - 0.5) * 2;
                ctx.fillStyle = '#93c5fd';
                ctx.fillRect(
                    centerX + 50,
                    centerY + 20 - windowSize * rightProgress / 2,
                    windowSize * rightProgress,
                    windowSize * rightProgress
                );

                if (rightProgress > 0.8) {
                    ctx.strokeStyle = '#3b82f6';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(
                        centerX + 50,
                        centerY + 20 - windowSize / 2,
                        windowSize,
                        windowSize
                    );
                    // 십자 프레임
                    ctx.beginPath();
                    ctx.moveTo(centerX + 70, centerY);
                    ctx.lineTo(centerX + 70, centerY + 40);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(centerX + 50, centerY + 20);
                    ctx.lineTo(centerX + 90, centerY + 20);
                    ctx.stroke();
                }
            }
        }

        function drawDoor(p) {
            if (p <= 0) return;
            
            const doorProgress = Math.min(p, 1);
            const doorWidth = 50;
            const doorHeight = 80;

            // 문
            ctx.fillStyle = '#8b5cf6';
            ctx.fillRect(
                centerX - doorWidth / 2,
                centerY + 100 - doorHeight * doorProgress,
                doorWidth,
                doorHeight * doorProgress
            );

            if (doorProgress > 0.9) {
                // 문 테두리
                ctx.strokeStyle = '#7c3aed';
                ctx.lineWidth = 3;
                ctx.strokeRect(
                    centerX - doorWidth / 2,
                    centerY + 20,
                    doorWidth,
                    doorHeight
                );

                // 문 손잡이
                ctx.fillStyle = '#fbbf24';
                ctx.beginPath();
                ctx.arc(centerX + 15, centerY + 60, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawComplete() {
            // 완성 효과 - 반짝임
            const time = Date.now() / 500;
            const sparkle = Math.sin(time) * 0.3 + 0.7;

            // 집 전체에 은은한 그림자
            ctx.shadowBlur = 20;
            ctx.shadowColor = `rgba(16, 185, 129, ${sparkle * 0.3})`;
            
            // 모든 요소 다시 그리기 (완성본)
            drawFoundation(1);
            drawFrame(1);
            drawWalls(1);
            drawRoof(1);
            drawWindows(1);
            drawDoor(1);
            
            ctx.shadowBlur = 0;

            // 잔디
            ctx.fillStyle = '#10b981';
            ctx.beginPath();
            ctx.ellipse(centerX, centerY + 120, 200, 20, 0, 0, Math.PI * 2);
            ctx.fill();

            // 별 효과
            for (let i = 0; i < 3; i++) {
                const angle = (time + i * 2) % (Math.PI * 2);
                const radius = 100 + Math.sin(time + i) * 20;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY - 50 + Math.sin(angle) * radius;
                
                ctx.fillStyle = `rgba(16, 185, 129, ${sparkle})`;
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 애니메이션 루프
        function animate() {
            // 배경
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 진행도 업데이트
            progress += stageSpeed;

            if (progress >= 1) {
                progress = 0;
                currentStage++;
                if (currentStage >= stages.length) {
                    currentStage = 0; // 처음부터 반복
                }
                document.getElementById('stage').textContent = stages[currentStage].name;
            }

            // 현재까지의 모든 단계 그리기
            if (currentStage >= 0) drawFoundation(currentStage > 0 ? 1 : progress);
            if (currentStage >= 1) drawFrame(currentStage > 1 ? 1 : progress);
            if (currentStage >= 2) drawWalls(currentStage > 2 ? 1 : progress);
            if (currentStage >= 3) drawRoof(currentStage > 3 ? 1 : progress);
            if (currentStage >= 4) drawWindows(currentStage > 4 ? 1 : progress);
            if (currentStage >= 5) drawDoor(currentStage > 5 ? 1 : progress);
            if (currentStage >= 6) drawComplete();

            requestAnimationFrame(animate);
        }

        // 시작!
        animate();
        console.log('✅ 집 건축 애니메이션 시작!');
    </script>
</body>
</html>
