<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daesan Hero Section Test</title>
  <!-- Pretendard CDN -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <style>
    /* Reset & Base Styles */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif; background: #fff; color: #123628; line-height: 1.4; overflow-x: hidden; }

    /* Layout Section */
    #vanta-birds-bg {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 700px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #fff;
    }

    /* New Canvas Style */
    #ds-kw-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0; /* Agency requirement: z-index 0 */
    }

    .main_visual_area {
      position: relative;
      z-index: 1; /* Content above canvas */
      text-align: center;
      width: 100%;
      max-width: 1200px;
      padding: 0 20px;
    }

    /* Typography - Agency Spec */
    .section_title { margin-bottom: 40px; }
    
    .tit {
      font-size: 60px;
      font-weight: 900;
      color: #123628;
      margin-bottom: 4px;
    }

    .eng {
      font-size: 60px;
      font-weight: 900;
      color: #123628;
      text-transform: uppercase;
      /* Remove underline & superscript span as requested */
      text-decoration: none;
      display: block;
      margin-bottom: 20px;
    }

    .txt {
      font-size: 14px;
      font-weight: 700;
      color: #123628;
      opacity: 1; /* Ensure opacity is 1 */
    }

    /* Search Module Placeholder (Cafe24 style) */
    fieldset {
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      max-width: 600px;
      margin: 0 auto;
      position: relative;
    }
    input[type="text"] {
      width: 100%;
      height: 64px;
      padding: 0 80px 0 30px;
      border: 1px solid #123628;
      border-radius: 32px;
      font-size: 18px;
      outline: none;
      background: #fff;
    }
    .search_btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      background: #123628;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .search_btn img { width: 22px; filter: invert(1); }

    /* Main Cate (Banners) area logic check */
    .main_cate {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 50px;
    }
    .main_cate li {
      background: #f8f9fa;
      padding: 15px 30px;
      border-radius: 12px;
      font-weight: 600;
      color: #123628;
      border: 1px solid #ddd;
    }
  </style>
</head>
<body>

<section id="vanta-birds-bg" class="main_section main_visual_section">

  <!-- New Keyword Floating Canvas -->
  <canvas id="ds-kw-canvas"></canvas>

  <div class="main_visual_area">
    <div class="section_title">
      <div class="tit">건축자재의 쿠팡</div>
      <div class="eng custom_font">대산</div>
      <div class="txt">건축자재도 이제 클릭 한 번이면 됩니다</div>
    </div>

    <!-- Search Module (Test Dummy) -->
    <div module="Layout_SearchHeader">
      <fieldset>
        <legend style="display:none">검색</legend>
        <input type="text" placeholder="검색어를 입력하세요">
        <a href="javascript:void(0)" class="search_btn">
          <img src="//ecimg.cafe24img.com/pg2383b21973322017/daesan3833/web/upload/free_design/search_btn_icon.png" alt="검색하기">
        </a>
      </fieldset>
    </div>

    <!-- Maintain main_cate as placeholder -->
    <ul class="main_cate">
      <li>최신단가표보기</li>
      <li>공지사항</li>
    </ul>
  </div>

  <!-- Animation Script -->
  <script>
  (function(){
    const cv   = document.getElementById('ds-kw-canvas');
    const ctx  = cv.getContext('2d');
    const sec  = document.getElementById('vanta-birds-bg');
    // Search center is calculated relative to the section
    const sbox = document.querySelector('.search_btn') || document.querySelector('fieldset');

    function setSize(){
      cv.width  = sec.offsetWidth;
      cv.height = sec.offsetHeight;
    }
    setSize();
    window.addEventListener('resize', setSize);

    const WORDS = ['합판','각재','석고보드','단열재','MDF','OSB','창호','집성목','코팅합판','방음재','플로링','흡음재','문틀','마루','방화문','목재','보드','텍스','단열','자재'];

    function sCenter(){
      const sr = sbox.getBoundingClientRect();
      const hr = sec.getBoundingClientRect();
      return { x: sr.left-hr.left+sr.width*.5, y: sr.top-hr.top+sr.height*.5 };
    }

    function mkP(initial){
      const w=cv.width, h=cv.height;
      let x,y;
      if(initial){ x=20+Math.random()*(w-40); y=20+Math.random()*(h-40); }
      else {
        const side=Math.floor(Math.random()*4);
        if(side===0){x=Math.random()*w;y=-24;}
        else if(side===1){x=w+24;y=Math.random()*h;}
        else if(side===2){x=Math.random()*w;y=h+24;}
        else{x=-24;y=Math.random()*h;}
      }
      return {
        word:WORDS[Math.floor(Math.random()*WORDS.length)],
        x,y,
        vx:(Math.random()-.5)*.4,
        vy:(Math.random()-.5)*.4,
        size:11+Math.random()*7,
        alpha:initial?Math.random()*0.08:0,
        maxA:0.055+Math.random()*0.065,
        phase:Math.random()*Math.PI*2,
        amp:7+Math.random()*10,
        dur:14+Math.random()*10,
        sucking:false,
        _oy:0
      };
    }

    let pts=Array.from({length:24},()=>mkP(true));
    const T0=performance.now();
    let t=0;

    function frame(ts){
      const elapsed=(ts-T0)/1000;
      ctx.clearRect(0,0,cv.width,cv.height);
      const sc=sCenter();
      const suckOn=elapsed>1.6;

      pts.forEach((p,i)=>{
        if(suckOn&&!p.sucking&&Math.random()<0.004) p.sucking=true;
        if(p.sucking){
          const dx=sc.x-p.x,dy=sc.y-p.y;
          const dist=Math.hypot(dx,dy);
          p.vx+=dx*0.014; p.vy+=dy*0.014;
          p.vx*=0.86; p.vy*=0.86;
          p.alpha=Math.max(0,p.alpha-0.005);
          p.x+=p.vx; p.y+=p.vy;
          if(dist<16||p.alpha<=0){pts[i]=mkP(false);return;}
        } else {
          const oy=Math.sin(t/p.dur*Math.PI*2+p.phase)*p.amp;
          p.y+=(oy-p._oy)*0.28; p._oy=oy;
          p.x+=p.vx;
          p.alpha=Math.min(p.maxA,p.alpha+0.003);
          if(p.x<-40||p.x>cv.width+40||p.y<-40||p.y>cv.height+40){pts[i]=mkP(false);return;}
        }
        ctx.save();
        ctx.font=`900 ${p.size}px 'Pretendard Variable',sans-serif`;
        ctx.fillStyle=`rgba(18,54,40,${Math.max(0,p.alpha)})`;
        ctx.fillText(p.word,p.x,p.y);
        ctx.restore();
      });

      if(suckOn){
        const a=Math.min(0.13,(elapsed-1.6)*0.05);
        const g=ctx.createRadialGradient(sc.x,sc.y,0,sc.x,sc.y,90);
        g.addColorStop(0,`rgba(201,168,76,${a})`);
        g.addColorStop(1,'rgba(201,168,76,0)');
        ctx.fillStyle=g;
        ctx.beginPath();ctx.arc(sc.x,sc.y,90,0,Math.PI*2);ctx.fill();
      }

      t+=0.016;
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  })();
  </script>

</section>

</body>
</html>
