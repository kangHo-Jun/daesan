<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDF 고밀도 섬유판 - 자트 건설자재 (Gemini v20)</title>
    <link rel="stylesheet" href="gemi_ver20.css">
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
</head>

<body>

    <div class="zart-wrap">
        <!-- Section 1: 회사 차별점 (통계 카드) -->
        <section class="zart-section zart-section--trust" data-animate>
            <div class="zart-stat-grid">
                <div class="zart-stat-card">
                    <div class="zart-stat-icon">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <path d="M12 2v20M2 12h20" />
                        </svg>
                    </div>
                    <div class="zart-stat-number"><span class="counter" data-target="40">0</span>+</div>
                    <div class="zart-stat-label">사업연차</div>
                </div>
                <div class="zart-stat-card">
                    <div class="zart-stat-icon">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                            <circle cx="9" cy="7" r="4" />
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                        </svg>
                    </div>
                    <div class="zart-stat-number"><span class="counter" data-target="1702">0</span>+</div>
                    <div class="zart-stat-label">관리거래처</div>
                </div>
                <div class="zart-stat-card">
                    <div class="zart-stat-icon">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                        </svg>
                    </div>
                    <div class="zart-stat-number"><span class="counter" data-target="467">0</span>+</div>
                    <div class="zart-stat-label">거래금액(억)</div>
                </div>
                <div class="zart-stat-card">
                    <div class="zart-stat-icon">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                            <polyline points="22 4 12 14.01 9 11.01" />
                        </svg>
                    </div>
                    <div class="zart-stat-number"><span class="counter" data-target="12">0</span>+</div>
                    <div class="zart-stat-label">정규직원수</div>
                </div>
            </div>
        </section>

        <!-- Section 3: 제품 상세 -->
        <section class="zart-section zart-section--product" data-animate>
            <section style="text-align:center; margin:60px 0;">
                <img src="UI/상세/템플릿예/MDF_ver1_프롬프터_ver2.1.png" alt="제품 상세 인포그래픽"
                    style="max-width:790px; width:100%; height:auto; border-radius:12px;" />
            </section>
        </section>

        <!-- Section 5: 만화 인포그래픽 -->
        <section class="zart-section zart-section--comic" data-animate>
            <section style="text-align:center; margin:40px 0;">
                <img src="만화/예제/ver3.1_단순_사례3.png" alt="만화 인포그래픽"
                    style="max-width:800px; width:100%; height:auto; border-radius:12px;" />
            </section>
        </section>
    </div>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                    const counters = entry.target.querySelectorAll('.counter');
                    counters.forEach(counter => {
                        const target = parseInt(counter.getAttribute('data-target'));
                        animateCounter(counter, target);
                    });
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('[data-animate]').forEach(el => observer.observe(el));

        function animateCounter(el, target) {
            let start = 0;
            const duration = 1000;
            const startTime = performance.now();
            function update(now) {
                const progress = Math.min((now - startTime) / duration, 1);
                el.textContent = Math.floor(progress * target).toLocaleString();
                if (progress < 1) requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }
    </script>
    <link rel="stylesheet" href="gemi_exp_color.css">
    <link rel="stylesheet" href="gemi_exp_layout.css">
</body>

</html>
